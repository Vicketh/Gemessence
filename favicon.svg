<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Gemessence icon">
  <defs>
    <linearGradient id="fGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="50%" stop-color="#F4D03F"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="fRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C00000"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#1a0800"/>

  <!-- G arc gold border -->
  <path d="M 38,6 A 24,24 0 1,0 38,58 L 38,38 L 28,38 L 28,32 L 46,32 L 46,62 A 30,30 0 1,1 46,2 Z"
        fill="url(#fGold)"/>
  <!-- G arc red fill -->
  <path d="M 36,10 A 18,18 0 1,0 36,54 L 36,36 L 30,36 L 30,34 L 42,34 L 42,58 A 24,24 0 1,1 42,6 Z"
        fill="url(#fRed)"/>

  <!-- Diamond gem -->
  <g transform="translate(16, 22)">
    <polygon points="8,0 16,7 8,20 0,7" fill="url(#fGold)"/>
    <polygon points="8,2 14,7 8,18 2,7" fill="#111"/>
    <line x1="8" y1="2" x2="8" y2="18" stroke="#D4AF37" stroke-width="0.6" opacity="0.6"/>
    <line x1="2" y1="7" x2="14" y2="7" stroke="#D4AF37" stroke-width="0.6" opacity="0.6"/>
  </g>

  <!-- Star sparkle -->
  <g transform="translate(50, 6)">
    <line x1="4" y1="0" x2="4" y2="8" stroke="#D4AF37" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="4" x2="8" y2="4" stroke="#D4AF37" stroke-width="1" stroke-linecap="round"/>
    <line x1="1" y1="1" x2="7" y2="7" stroke="#D4AF37" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="7" y1="1" x2="1" y2="7" stroke="#D4AF37" stroke-width="0.5" stroke-linecap="round"/>
  </g>
</svg>
