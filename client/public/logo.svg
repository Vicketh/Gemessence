<svg width="240" height="50" viewBox="0 0 240 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Luxury gold gradient -->
    <linearGradient id="luxuryGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A646;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A67C00;stop-opacity:1" />
    </linearGradient>

    <!-- Elegant shadow -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.2"/>
    </filter>

    <!-- Subtle glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main brand text -->
  <text x="120" y="32" font-family="Georgia, 'Times New Roman', serif"
        font-size="24" font-weight="600" text-anchor="middle"
        fill="url(#luxuryGold)" filter="url(#textShadow)"
        letter-spacing="0.5px">
    Gemessence
  </text>

  <!-- Elegant underline with jewel accents -->
  <line x1="75" y1="38" x2="165" y2="38" stroke="url(#luxuryGold)" stroke-width="1" opacity="0.8"/>
  <circle cx="75" cy="38" r="1.2" fill="url(#luxuryGold)" opacity="0.9"/>
  <circle cx="165" cy="38" r="1.2" fill="url(#luxuryGold)" opacity="0.9"/>
  <circle cx="120" cy="38" r="0.8" fill="#E6B800" opacity="0.8"/>

  <!-- Decorative diamond/sparkle elements -->
  <polygon points="40,15 42,18 45,15 42,12" fill="url(#luxuryGold)" opacity="0.6"/>
  <polygon points="200,18 202,21 205,18 202,15" fill="url(#luxuryGold)" opacity="0.5"/>
  <circle cx="35" cy="25" r="0.6" fill="#D4AF37" opacity="0.7"/>
  <circle cx="205" cy="22" r="0.5" fill="#B8860B" opacity="0.6"/>
</svg>