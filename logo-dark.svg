<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" fill="none" role="img" aria-label="Gemessence">
  <defs>
    <linearGradient id="gGold-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a07820"/>
      <stop offset="30%" stop-color="#e8c84a"/>
      <stop offset="60%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <linearGradient id="gRed-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E00000"/>
      <stop offset="100%" stop-color="#A00000"/>
    </linearGradient>
    <linearGradient id="gemBlack-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="40%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="swooshRed-d" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8c84a"/>
      <stop offset="20%" stop-color="#E00000"/>
      <stop offset="100%" stop-color="#A00000"/>
    </linearGradient>
    <filter id="glow-d" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══ BIG G ARC ═══ -->
  <path d="M 118,22 A 72,72 0 1,0 118,118 L 118,82 L 88,82 L 88,72 L 130,72 L 130,130 A 88,88 0 1,1 130,10 Z"
        fill="url(#gGold-d)" />
  <path d="M 112,30 A 60,60 0 1,0 112,110 L 112,80 L 94,80 L 94,74 L 120,74 L 120,122 A 76,76 0 1,1 120,18 Z"
        fill="url(#gRed-d)" />

  <!-- ═══ GEM DIAMOND inside G ═══ -->
  <g transform="translate(52, 52)">
    <polygon points="22,0 44,18 22,52 0,18" fill="url(#gGold-d)"/>
    <polygon points="22,4 40,18 22,48 4,18" fill="url(#gemBlack-d)"/>
    <polygon points="22,4 40,18 22,18" fill="#3a3a3a" opacity="0.8"/>
    <line x1="22" y1="4" x2="22" y2="48" stroke="#F4D03F" stroke-width="0.8" opacity="0.7"/>
    <line x1="4" y1="18" x2="40" y2="18" stroke="#F4D03F" stroke-width="0.8" opacity="0.7"/>
    <polygon points="22,4 30,11 22,18 14,11" fill="#aaa" opacity="0.3"/>
  </g>

  <!-- ═══ SCRIPT TEXT "Gemessence" ═══ -->
  <text x="148" y="108"
        font-family="'Palatino Linotype', 'Book Antiqua', Palatino, 'Times New Roman', Georgia, serif"
        font-size="72" font-weight="700" font-style="italic"
        fill="#F5F0E8" letter-spacing="-1">Gemessence</text>

  <!-- ═══ RED SWOOSH UNDERLINE ═══ -->
  <path d="M 80,128 Q 160,148 420,132" stroke="#3a0000" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 78,124 Q 158,144 418,128" stroke="url(#swooshRed-d)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- ═══ GOLD 8-POINT STAR SPARKLE ═══ -->
  <g transform="translate(368, 18)" filter="url(#glow-d)">
    <line x1="16" y1="0" x2="16" y2="32" stroke="#F4D03F" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="16" x2="32" y2="16" stroke="#F4D03F" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="4" x2="28" y2="28" stroke="#F4D03F" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="28" y1="4" x2="4" y2="28" stroke="#F4D03F" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="16" cy="16" r="2" fill="#FFE566"/>
  </g>
</svg>
